<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bura Kozyol 1-Player</title>
    <style>
        body { margin: 0; padding: 0; background: #0e4d2a; color: white; font-family: sans-serif; text-align: center; }
        .score-board { display: flex; justify-content: space-around; background: rgba(0,0,0,0.4); padding: 15px; font-weight: bold; }
        .table { width: 90%; height: 200px; border: 3px solid #0b3d21; margin: 20px auto; border-radius: 50%; position: relative; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .card { width: 60px; height: 90px; background: white; color: black; border-radius: 8px; font-size: 18px; font-weight: bold; display: flex; flex-direction: column; justify-content: center; box-shadow: 0 4px 6px rgba(0,0,0,0.5); }
        .red { color: #e74c3c; }
        .my-hand { display: flex; justify-content: center; gap: 10px; margin-top: 50px; }
        #status { margin-top: 10px; color: #f1c40f; }
    </style>
</head>
<body>

<div class="score-board">
    <span>Bot: <span id="bot-score">0</span></span>
    <span>Siz: <span id="user-score">0</span></span>
</div>

<div class="table" id="table">
    </div>

<p id="status">Karta tanlang!</p>

<div class="my-hand" id="user-hand"></div>

<script>
    const suits = ['♥️', '♦️', '♣️', '♠️'];
    const values = ['6', '7', '8', '9', 'V', 'D', 'K', '10', 'T'];
    const points = {'6':0, '7':0, '8':0, '9':0, 'V':2, 'D':3, 'K':4, '10':10, 'T':11};

    function createCardElement(val, suit, isUser) {
        const div = document.createElement('div');
        div.className = 'card' + (suit === '♥️' || suit === '♦️' ? ' red' : '');
        div.innerHTML = `<div>${val}</div><div>${suit}</div>`;
        if(isUser) div.onclick = () => playCard(val, suit, div);
        return div;
    }

    function playCard(val, suit, element) {
        const table = document.getElementById('table');
        table.innerHTML = ""; 
        table.appendChild(element); // Sizning kartangiz
        element.onclick = null;
        
        document.getElementById('status').innerText = "Bot yurmoqda...";
        
        // Bot javobi (Tasodifiy bitta karta)
        setTimeout(() => {
            const bVal = values[Math.floor(Math.random()*values.length)];
            const bSuit = suits[Math.floor(Math.random()*suits.length)];
            const botCard = createCardElement(bVal, bSuit, false);
            table.appendChild(botCard);
            
            document.getElementById('status').innerText = "Navbat sizda!";
            updateScores(points[val], points[bVal]);
        }, 1000);
    }

    let uScore = 0, bScore = 0;
    function updateScores(u, b) {
        uScore += u; bScore += b;
        document.getElementById('user-score').innerText = uScore;
        document.getElementById('bot-score').innerText = bScore;
    }

    // Boshlang'ich 4 ta karta
    const hand = document.getElementById('user-hand');
    for(let i=0; i<4; i++) {
        hand.appendChild(createCardElement(values[Math.floor(Math.random()*values.length)], suits[Math.floor(Math.random()*suits.length)], true));
    }
</script>
</body>
</html>
