<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Burkozyol: Umut Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; }
        #game-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <script>
        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            parent: 'game-container',
            physics: { default: 'arcade' },
            scene: { preload: preload, create: create }
        };

        const game = new Phaser.Game(config);

        function preload() {
            // Siz yuklagan rasmlarni ulash
            this.load.spritesheet('cards', 'assets/cards_all.png', { frameWidth: 103.4, frameHeight: 154 });
            this.load.image('table', 'assets/table_bg.png');
            this.load.image('avatar', 'assets/user_avatar.png');
        }

        function create() {
            // Stolni ekranga moslab chizish
            let bg = this.add.image(config.width/2, config.height/2, 'table');
            bg.setDisplaySize(config.width, config.height);

            // Avatarni tepaga qo'yish
            this.add.image(60, 60, 'avatar').setScale(0.2);

            // Kozirni aniqlash (tasodifiy)
            const suits = ['♠', '♥️', '♣', '♦️'];
            const trump = suits[Math.floor(Math.random() * suits.length)];
            this.add.text(config.width - 120, 30, `Kozir: ${trump}`, { fontSize: '24px', fill: '#f1c40f', fontWeight: 'bold' });

            // Foydalanuvchiga 4 ta karta tarqatish animatsiyasi
            for(let i=0; i<4; i++) {
                // Spritesheetdan tasodifiy karta (kadr) tanlash
                let frameIdx = Math.floor(Math.random() * 52); 
                let card = this.add.sprite(config.width / 2, -100, 'cards', frameIdx);
                card.setScale(0.8);
                
                // Kartani pastga, qo'lingizga uchib kelish animatsiyasi
                this.tweens.add({
                    targets: card,
                    y: config.height - 100,
                    x: (config.width / 2 - 120) + (i * 80),
                    duration: 800,
                    delay: i * 150,
                    ease: 'Back.easeOut'
                });

                card.setInteractive();
                card.on('pointerdown', function() {
                    this.y -= 30; // Tanlanganini bildirish uchun tepaga ko'tariladi
                    this.setTint(0xf1c40f);
                });
            }

            this.add.text(config.width/2, config.height/2 - 50, "O'yin Tayyor!", { fontSize: '32px', fill: '#fff' }).setOrigin(0.5);
        }
    </script>
</body>
</html>
